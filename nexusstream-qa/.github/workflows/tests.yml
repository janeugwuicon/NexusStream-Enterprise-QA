name: Playwright Enterprise Suite
on: [push, pull_request]

jobs:
  test:
    timeout-minutes: 15 # Reduced from 60; lead efficiency matters
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5 # Updated to v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest playwright pytest-playwright allure-pytest pytest-xdist
        playwright install --with-deps chromium

    - name: Run tests (Parallel & Headless)
      # We use '|| true' to ensure the workflow continues to report generation 
      # even if tests fail (standard exit code for failed tests is non-zero)
      run: pytest -n 4 --alluredir=allure-results
      continue-on-error: true 

    - name: Generate Allure Report
      # This step converts raw data into a viewable HTML website
      uses: simple-elf/allure-report-action@v1.7
      if: always()
      with:
        allure_results: allure-results
        allure_report: allure-report
        gh_pages: gh-pages
        allure_history: allure-history

    - name: Store Allure Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: enterprise-test-report
        path: allure-report
        retention-days: 7